<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AstroHair — Calendário de Corte</title>
<style>
/* ── TOKENS ESCURO ───────────────────────────────────────── */
[data-theme="dark"] {
  --bg:#0C0D0F; --card:#13151A; --border:#1E2228; --muted:#272B34;
  --text:#E8E4DC; --dim:#7A8290; --dim2:#A8B0BC;
  --gold:#C9A84C; --gold-dk:#7A6228; --gold-bg:#1a1508; --gold-border:#3a2a10;
  --green:#5BAF82; --green-bg:#0d2019; --green-border:#1a4030;
  --red:#C85B5B; --red-bg:#1a0e0e; --red-border:#3a1a1a;
  --blue:#5B8AC8; --blue-bg:#0d1520; --blue-border:#1a2a40;
  --best-bg:#1a1508; --avoid-bg:#1a0e0e;
  --shadow:none;
}
/* ── TOKENS CLARO ────────────────────────────────────────── */
[data-theme="light"] {
  --bg:#F5F4F0; --card:#FFFFFF; --border:#DDD8CE; --muted:#EAE7E0;
  --text:#1A1A1A; --dim:#7A7870; --dim2:#4A4840;
  --gold:#8A6B20; --gold-dk:#6A4B10; --gold-bg:#FFF8E8; --gold-border:#DEB84A;
  --green:#2A7A50; --green-bg:#E8F5EE; --green-border:#5BAF82;
  --red:#A03030; --red-bg:#FBE8E8; --red-border:#C85B5B;
  --blue:#2A5A98; --blue-bg:#E8F0FB; --blue-border:#5B8AC8;
  --best-bg:#FFF8E0; --avoid-bg:#FBE8E8;
  --shadow:0 1px 3px rgba(0,0,0,.08);
}
/* ── IMPRESSÃO ───────────────────────────────────────────── */
@media print {
  html { --bg:#FFFFFF; --card:#FFFFFF; --border:#CCCCCC; --muted:#F0F0F0;
    --text:#000000; --dim:#555555; --dim2:#333333;
    --gold:#8A6B20; --gold-dk:#6A4B10; --gold-bg:#FFF8E0; --gold-border:#DEB84A;
    --green:#2A7A50; --green-bg:#E8F5EE; --green-border:#5BAF82;
    --red:#A03030; --red-bg:#FBE8E8; --red-border:#C85B5B;
    --blue:#2A5A98; --blue-bg:#E8F0FB; --blue-border:#5B8AC8;
    --best-bg:#FFF8E0; --avoid-bg:#FBE8E8; --shadow:none; }
  .no-print { display:none !important; }
  body { padding:16px; }
  .agenda-card, .best-day { break-inside:avoid; }
  header { border-bottom:1px solid #ccc; }
}

* { box-sizing:border-box; margin:0; padding:0; }
body { background:var(--bg); color:var(--text); font-family:system-ui,sans-serif; padding:0 16px 80px; transition:background .2s,color .2s; }
.wrap { max-width:720px; margin:0 auto; }

/* HEADER */
header { padding:24px 0 18px; border-bottom:1px solid var(--border); margin-bottom:24px; display:flex; align-items:flex-start; justify-content:space-between; gap:12px; }
.header-text {}
.eyebrow { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:var(--gold); margin-bottom:8px; }
h1 { font-size:clamp(17px,4vw,24px); font-weight:300; line-height:1.3; color:var(--text); }
h1 strong { font-weight:600; }

/* TOGGLE TEMA */
.theme-toggle { background:var(--card); border:1px solid var(--border); border-radius:20px; cursor:pointer; display:flex; align-items:center; gap:6px; padding:6px 12px; font-size:12px; color:var(--dim2); transition:border-color .15s; white-space:nowrap; flex-shrink:0; margin-top:4px; }
.theme-toggle:hover { border-color:var(--gold); color:var(--text); }

/* FORM */
.form-card { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:20px; margin-bottom:14px; box-shadow:var(--shadow); }
.fields { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
.full { grid-column:1/-1; }
label { display:block; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--dim); margin-bottom:5px; }
input { width:100%; background:var(--muted); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:14px; padding:9px 11px; outline:none; transition:border-color .15s; }
input:focus { border-color:var(--gold); }
input::placeholder { color:var(--dim); }
.btn { width:100%; background:var(--gold); border:none; border-radius:6px; color:#fff; cursor:pointer; font-size:12px; font-weight:700; letter-spacing:1px; padding:12px; text-transform:uppercase; transition:opacity .15s; }
[data-theme="light"] .btn { color:#000; }
.btn:hover { opacity:.85; }
.btn:disabled { opacity:.35; cursor:not-allowed; }

.loading { display:none; text-align:center; padding:40px; color:var(--dim); font-size:13px; }
.spinner { width:22px; height:22px; border:2px solid var(--border); border-top-color:var(--gold); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto 12px; }
@keyframes spin { to { transform:rotate(360deg); } }

#results { display:none; }
.results-header { display:flex; align-items:baseline; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap; gap:8px; }
.results-name { font-size:14px; font-weight:600; color:var(--text); }
.results-sub { font-size:11px; color:var(--dim); }

/* MELHOR DIA */
.best-day { background:var(--gold-bg); border:2px solid var(--gold); border-radius:10px; padding:22px 24px; margin-bottom:20px; position:relative; overflow:hidden; box-shadow:0 0 24px rgba(201,168,76,0.12); }
.best-day::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg,var(--gold),transparent); }
.best-label { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--gold); margin-bottom:12px; font-weight:600; }
.best-main { display:flex; align-items:flex-end; gap:20px; margin-bottom:10px; flex-wrap:wrap; }
.best-date { font-size:28px; font-weight:700; color:var(--text); line-height:1; }
.best-peak { font-size:20px; font-weight:600; font-family:monospace; color:var(--gold); }
.best-window { font-size:11px; color:var(--dim2); font-family:monospace; margin-top:3px; }
.best-objs { display:flex; gap:8px; flex-wrap:wrap; }
.best-obj { background:var(--card); border:1px solid var(--gold-border); border-radius:4px; font-size:11px; padding:3px 10px; color:var(--gold); }

/* LEGENDA */
.legenda { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:14px; padding:10px 14px; background:var(--card); border-radius:8px; border:1px solid var(--border); }
.leg-item { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--dim2); }

/* TABELA */
.cal-wrap { overflow-x:auto; margin-bottom:20px; border-radius:8px; border:1px solid var(--border); }
table { width:100%; border-collapse:collapse; font-size:13px; background:var(--card); }
thead th { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:var(--dim); padding:10px 10px; text-align:left; border-bottom:1px solid var(--border); background:var(--card); white-space:nowrap; }
thead th.center { text-align:center; }
tbody tr { border-bottom:1px solid var(--border); cursor:pointer; transition:background .1s; }
tbody tr:last-child { border-bottom:none; }
tbody tr:hover { background:var(--muted); }
tbody tr.best-row { background:var(--best-bg); }
tbody tr.avoid-row { background:var(--avoid-bg); }
tbody tr.expanded { background:var(--muted); }

td { padding:11px 10px; vertical-align:middle; }
.date-day { font-size:16px; font-weight:700; color:var(--text); line-height:1; }
.date-mon { font-size:9px; color:var(--dim); text-transform:uppercase; letter-spacing:1px; }
.time-peak { font-size:14px; font-weight:700; font-family:monospace; color:var(--text); }
.time-win { font-size:10px; color:var(--dim2); font-family:monospace; margin-top:2px; white-space:nowrap; }
.td-sym { text-align:center; font-size:15px; }

/* Símbolos HTML puros — sem depender de emoji */
.sym-crown { color:var(--gold); font-weight:700; font-size:14px; }
.sym-star  { color:var(--gold); font-weight:700; }
.sym-ok    { color:var(--green); font-weight:700; }
.sym-warn  { color:var(--gold); font-weight:700; }
.sym-no    { color:var(--red); font-weight:700; font-size:15px; }
.sym-dash  { color:var(--dim); }

.td-obj { color:var(--dim2); font-size:12px; }
.td-obj.multi { color:var(--gold); font-weight:500; }
.td-obj.avoid { color:var(--red); }
.td-chevron { text-align:right; color:var(--dim); font-size:10px; padding-right:12px; }
tr.expanded .td-chevron { transform:rotate(180deg); }
.td-chevron { transition:transform .2s; font-size:16px; color:var(--dim2); padding-right:14px; }
tr.expanded .td-chevron { color:var(--gold); }

/* DETALHE */
.detail-row { display:none; }
.detail-row.open { display:table-row; }
.detail-cell { padding:0 10px 12px; }
.detail-box { background:var(--bg); border:1px solid var(--border); border-radius:6px; overflow:hidden; }
.detail-tabs { display:flex; border-bottom:1px solid var(--border); }
.dtab { flex:1; padding:9px 8px; font-size:10px; letter-spacing:1px; text-transform:uppercase; text-align:center; cursor:pointer; color:var(--dim); border:none; background:none; border-bottom:2px solid transparent; margin-bottom:-1px; transition:color .15s; }
.dtab.active { color:var(--gold); border-bottom-color:var(--gold); }
.dpanel { display:none; padding:14px; }
.dpanel.active { display:block; }
.expl-text { font-size:13px; color:var(--dim2); line-height:1.75; margin-bottom:10px; }
.q-chips { display:flex; flex-wrap:wrap; gap:5px; }
.q-chip { background:var(--blue-bg); border:1px solid var(--blue-border); border-radius:4px; color:var(--blue); font-size:11px; padding:3px 8px; }
.prof-sec { margin-bottom:12px; }
.prof-sec-lbl { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--dim); border-bottom:1px solid var(--border); padding-bottom:3px; margin-bottom:7px; }
.prof-row { display:flex; justify-content:space-between; padding:2px 0; font-size:12px; }
.pk { color:var(--dim2); }
.pv { color:var(--text); font-family:monospace; font-size:11px; }
.pv.hi { color:var(--gold); }
.leg-bar { display:flex; gap:16px; flex-wrap:wrap; font-size:11px; color:var(--dim2); margin-bottom:8px; padding:0 2px; }
.leg-bar span { display:flex; align-items:center; gap:4px; }
.cal-hint { font-size:11px; color:var(--dim); margin-bottom:8px; padding:0 2px; }
.action-bar { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
.action-bar button { display:flex; align-items:center; gap:6px; background:var(--card); border:1px solid var(--border); border-radius:6px; color:var(--dim2); cursor:pointer; font-size:11px; font-weight:600; letter-spacing:.5px; padding:8px 14px; transition:border-color .15s,color .15s; }
.action-bar button:hover { border-color:var(--gold); color:var(--text); }
.action-bar .btn-primary { background:var(--gold); border-color:var(--gold); color:#fff; }
[data-theme="light"] .action-bar .btn-primary { color:#000; }
.proxima-oportunidade { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:16px 20px; margin-top:8px; display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
.prox-label { font-size:9px; letter-spacing:2px; text-transform:uppercase; color:var(--dim); margin-bottom:4px; }
.prox-date { font-size:18px; font-weight:700; color:var(--text); }
.prox-time { font-size:13px; font-family:monospace; color:var(--gold); margin-left:8px; }
.prox-dias { font-size:11px; color:var(--dim2); margin-top:2px; }
.analise-ts { font-size:10px; color:var(--dim); margin-left:auto; }
.err { background:var(--red-bg); border:1px solid var(--red-border); border-radius:6px; color:var(--red); font-size:12px; padding:10px 14px; display:none; margin-bottom:10px; }
</style>
<link rel="stylesheet" href="components/kalon-report/AgendaKalon/agenda_kalon.css">
<link rel="stylesheet" href="components/kalon-report/KalonIdentity/kalon_identity.css">
<script src="components/kalon-report/AgendaKalon/agenda_kalon.js"></script>
<script src="components/kalon-report/KalonIdentity/kalon_identity.js"></script>
<script src="components/kalon-report/KalonReport/kalon_report.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div class="wrap">

<header>
  <div class="header-text">
    <div class="eyebrow">Kalon Astro · AstroHair</div>
    <h1><strong>Calendário de corte</strong><br>personalizado pelo mapa natal</h1>
  </div>
  <button class="theme-toggle no-print" onclick="toggleTheme()" id="theme-btn">☀️ Modo claro</button>
</header>

<div class="form-card no-print">
  <div class="fields">
    <div class="full"><label>Nome</label><input id="nome" value="Roberto Gama" placeholder="Seu nome"></div>
    <div><label>Data de nascimento</label><input id="data" type="date" value="1957-08-29"></div>
    <div><label>Hora (local)</label><input id="hora" type="time" value="00:00"></div>
    <div class="full" style="position:relative;">
      <label>Cidade de nascimento</label>
      <input id="cidade" autocomplete="off" oninput="filtrarCidades()" onfocus="filtrarCidades()" onblur="setTimeout(()=>document.getElementById('cidade-lista').style.display='none',200)" placeholder="Digite o nome da cidade...">
      <div id="cidade-lista" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--gold);border-radius:6px;max-height:200px;overflow-y:auto;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.3);margin-top:4px;"></div>
    </div>

  </div>
  <!-- DATA INÍCIO E PERÍODO -->
  <div class="fields" style="margin-bottom:14px;">
    <div>
      <label>Data de início</label>
      <input type="date" id="data-inicio" value="2026-07-01" style="width:100%;">
    </div>
    <div>
      <label>Período</label>
      <select id="periodo" style="width:100%;background:var(--muted);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;padding:9px 11px;outline:none;appearance:none;">
        <option value="1">1 mês</option>
        <option value="3">3 meses</option>
        <option value="6">6 meses</option>
        <option value="12">12 meses</option>
      </select>
    </div>
    <div id="coords-manual" style="display:none;grid-column:1/-1;grid-template-columns:1fr 1fr;gap:10px;">
      <div>
        <label>Latitude (opcional)</label>
        <input id="latitude" type="number" step="0.0001" placeholder="ex: -22.9835">
      </div>
      <div>
        <label>Longitude (opcional)</label>
        <input id="longitude" type="number" step="0.0001" placeholder="ex: -49.8672">
      </div>
    </div>
    <div style="grid-column:1/-1;font-size:11px;color:var(--dim);margin-top:-6px;">
      <a href="#" onclick="toggleCoords();return false;" style="color:var(--gold);text-decoration:none;">
        🌍 Cidade fora do Brasil? Informe coordenadas manualmente
      </a>
    </div>
  </div>
  <div class="err" id="err"></div>
  <button class="btn" id="btn" onclick="gerar()">Gerar calendário</button>
</div>

<div class="loading no-print" id="loading">
  <div class="spinner"></div>
  Calculando posições planetárias e montando seu calendário…
</div>

<div id="agendaHair"></div>

<script>
function gerar() {
  const nome = document.getElementById('nome').value.trim();
  const data = document.getElementById('data').value;
  const cidade = document.getElementById('cidade').value.trim();
  const dataInicio = document.getElementById('data-inicio').value;
  const periodo = parseInt(document.getElementById('periodo').value);
  const err = document.getElementById('err');
  err.style.display = 'none';
  
  if (!nome||!data||!cidade) { err.textContent='Preencha nome, data e cidade.'; err.style.display='block'; return; }
  if (!dataInicio) { err.textContent='Preencha a data de início.'; err.style.display='block'; return; }
  
  const btn = document.getElementById('btn');
  btn.disabled = true;
  document.getElementById('loading').style.display = 'block';

  const container = document.getElementById('agendaHair');
  
  const iniciarComponente = () => {
    new KalonReport({
      estrategia: 'hair_corte',
      container: container,
      nivel: 'essencial',
      nome: nome,
      data_nascimento: data,
      hora_nascimento: document.getElementById('hora').value || '00:00',
      cidade: cidade,
      latitude: parseFloat(document.getElementById('latitude')?.value) || null,
      longitude: parseFloat(document.getElementById('longitude')?.value) || null,
      data_inicio: dataInicio,
      periodo_meses: periodo
    }).render();
    
    // Escuta o custom event para voltar a habilitar o form, caso clique em "nova análise"
    container.addEventListener('agenda:nova', () => {
      document.getElementById('err').style.display = 'none';
      btn.disabled = false;
    });

    setTimeout(() => {
      document.getElementById('loading').style.display = 'none';
      btn.disabled = false;
    }, 800);
  };

  iniciarComponente();
}

function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  html.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = isDark ? '🌙 Modo escuro' : '☀️ Modo claro';
}

// AUTOCOMPLETE CIDADES
const CIDADES_BR = [
  "Americana, SP","Anápolis, GO","Apucarana, PR","Aracaju, SE","Araçatuba, SP",
  "Araguaína, TO","Araraquara, SP","Araras, SP","Araucária, PR","Assis, SP",
  "Atibaia, SP","Bagé, RS","Barbacena, MG","Barreiras, BA","Barretos, SP",
  "Barueri, SP","Bauru, SP","Belém, PA","Belo Horizonte, MG","Betim, MG",
  "Blumenau, SC","Boa Vista, RR","Botucatu, SP","Brasília, DF","Caçapava, SP",
  "Campina Grande, PB","Campinas, SP","Campo Grande, MS","Campo Largo, PR",
  "Campos dos Goytacazes, RJ","Carapicuíba, SP","Caruaru, PE","Cascavel, PR",
  "Catanduva, SP","Caxias do Sul, RS","Chapecó, SC","Colombo, PR","Contagem, MG",
  "Corumbá, MS","Cotia, SP","Criciúma, SC","Cuiabá, MT","Curitiba, PR",
  "Diadema, SP","Divinópolis, MG","Dourados, MS","Duque de Caxias, RJ",
  "Embu das Artes, SP","Feira de Santana, BA","Florianópolis, SC","Fortaleza, CE",
  "Foz do Iguaçu, PR","Franca, SP","Garanhuns, PE","Goiânia, GO",
  "Governador Valadares, MG","Gravataí, RS","Guarapuava, PR","Guaratinguetá, SP",
  "Guarujá, SP","Guarulhos, SP","Ilhéus, BA","Imperatriz, MA","Indaiatuba, SP",
  "Ipatinga, MG","Itajaí, SC","Itapetininga, SP","Itaquaquecetuba, SP","Itu, SP",
  "Jaboatão dos Guararapes, PE","Jacareí, SP","Jequié, BA","João Pessoa, PB",
  "Joinville, SC","Juazeiro do Norte, CE","Juiz de Fora, MG","Jundiaí, SP",
  "Leme, SP","Limeira, SP","Linhares, ES","Londrina, PR","Macaé, RJ",
  "Macapá, AP","Maceió, AL","Manaus, AM","Marabá, PA","Maracanaú, CE",
  "Maringá, PR","Marília, SP","Mauá, SP","Mogi das Cruzes, SP","Mogi Guaçu, SP",
  "Montes Claros, MG","Mossoró, RN","Natal, RN","Nilópolis, RJ","Niterói, RJ",
  "Nova Friburgo, RJ","Nova Iguaçu, RJ","Novo Hamburgo, RS","Olinda, PE",
  "Osasco, SP","Ourinhos, SP","Palmas, TO","Paranaguá, PR","Parnamirim, RN",
  "Passo Fundo, RS","Paulista, PE","Pelotas, RS","Petrolina, PE","Petrópolis, RJ",
  "Piracicaba, SP","Porto Alegre, RS","Porto Velho, RO","Presidente Prudente, SP",
  "Recife, PE","Ribeirão das Neves, MG","Ribeirão Preto, SP","Rio Branco, AC",
  "Rio Claro, SP","Rio de Janeiro, RJ","Rio Verde, GO","Rondonópolis, MT",
  "Salvador, BA","Santa Luzia, MG","Santa Maria, RS","Santarém, PA",
  "Santo André, SP","Santos, SP","São Bernardo do Campo, SP","São Carlos, SP",
  "São José do Rio Preto, SP","São José dos Campos, SP","São José dos Pinhais, PR",
  "São Leopoldo, RS","São Luís, MA","São Paulo, SP","São Vicente, SP",
  "Serra, ES","Sete Lagoas, MG","Sinop, MT","Sorocaba, SP","Sumaré, SP",
  "Suzano, SP","Taboão da Serra, SP","Taubaté, SP","Teresina, PI","Teresópolis, RJ",
  "Uberaba, MG","Uberlândia, MG","Várzea Grande, MT","Viamão, RS","Vila Velha, ES",
  "Vitória, ES","Vitória da Conquista, BA","Volta Redonda, RJ"
];

function filtrarCidades() {
  const input = document.getElementById('cidade');
  const lista = document.getElementById('cidade-lista');
  const termo = input.value.toLowerCase().trim();
  if (termo.length < 2) { lista.style.display='none'; return; }
  const filtradas = CIDADES_BR.filter(c => c.toLowerCase().includes(termo)).slice(0,10);
  if (!filtradas.length) { lista.style.display='none'; return; }
  lista.innerHTML = filtradas.map(c =>
    '<div onclick="selecionarCidade(\'' + c + '\')" ' +
    'style="padding:10px 14px;cursor:pointer;font-size:13px;color:var(--text);border-bottom:1px solid var(--border);transition:background .1s;" ' +
    'onmouseover="this.style.background=\'var(--muted)\'" onmouseout="this.style.background=\'\'"> ' +
    c + '</div>'
  ).join('');
  lista.style.display = 'block';
}

function selecionarCidade(cidade) {
  document.getElementById('cidade').value = cidade;
  document.getElementById('cidade-lista').style.display = 'none';
}

function toggleCoords() {
  const el = document.getElementById('coords-manual');
  el.style.display = el.style.display === 'none' ? 'grid' : 'none';
}

</script>
</body>
</html>
