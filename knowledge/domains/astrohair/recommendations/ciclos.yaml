recomendacoes:

  - id: cic_01
    objetivo: estimular_crescimento
    descricao: Cortar o cabelo preferencialmente na Lua Crescente — fase associada ao ciclo anágena e ao crescimento
    evidencia_origem: ciclo_capilar
    objeto_astrologico: lua
    indicadores_alvo:
      - crescimento_capilar

  - id: cic_02
    objetivo: fortalecer_foliculo
    descricao: Aplicar tratamentos intensivos (máscaras, óleos) na Lua Cheia — pico de absorção e vitalidade
    evidencia_origem: ciclo_capilar
    objeto_astrologico: lua
    indicadores_alvo:
      - espessura_do_fio
      - hidratacao_capilar

  - id: cic_03
    objetivo: equilibrar_oleosidade
    descricao: Lavagens mais frequentes na Lua Nova — fase de maior produção sebácea para alguns biotipos
