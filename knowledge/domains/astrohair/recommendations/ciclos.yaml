    objeto_astrologico: lua
    indicadores_alvo:
      - oleosidade_capilar

  - id: cic_04
    objetivo: retardar_envelhecimento
    descricao: Período de Saturn Return (~29 anos) — fase de revisão da estrutura capilar; considerar avaliação tricológica preventiva
    evidencia_origem: envelhecimento_estrutural
    objeto_astrologico: saturno
    indicadores_alvo:
      - envelhecimento_capilar
      - espessura_do_fio

  - id: cic_05
    objetivo: estimular_crescimento
    descricao: Trânsitos de Júpiter sobre o ASC ou Lua — janelas favoráveis para tratamentos de crescimento intensivo
    evidencia_origem: ciclo_capilar
    objeto_astrologico: jupiter
    indicadores_alvo:
      - crescimento_capilar
