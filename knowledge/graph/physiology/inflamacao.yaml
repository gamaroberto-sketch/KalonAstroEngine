# KALON ASTRO — KNOWLEDGE GRAPH | Inflamação | v1.0
# Camada: Fisiologia — processos que ocorrem nos sistemas
# Universal — reutilizável em AstroHair, AstroDiet, AstroPower, Astromedicina
node:
  id: inflamacao
  nome: Inflamação
  tipo: processo_fisiologico
  camada: fisiologia

relacoes:

  # ── O QUE É (fato fisiológico) ────────────────────────────
  - tipo: e_resposta_de
    alvo: sistema_imunologico
    contexto: fisiologia_universal

  - tipo: afeta_estrutura
    alvo: couro_cabeludo
    contexto: fisiologia_universal

  - tipo: afeta_estrutura
    alvo: foliculo_capilar
    contexto: fisiologia_universal
    nota: inflamação crônica no folículo leva à destruição irreversível

  # ── CONEXÃO COM OBJETOS ASTROLÓGICOS (fatos, não hipóteses) ──
  # A aresta diz: "Marte está relacionado a inflamação como processo"
  # O MOTOR conclui: "Marte → inflamação → queda_capilar"

  - tipo: relacionado_a_objeto
    alvo: marte
    contexto: ocidental_todas
    nota: Marte representa calor, reatividade, processos agudos

  - tipo: relacionado_a_objeto
    alvo: escorpiao
    contexto: ocidental_todas
    nota: Escorpião representa processos imunológicos profundos e crônicos

  - tipo: relacionado_a_signo
    alvo: aries
    contexto: ocidental_todas
    nota: Áries rege a cabeça — couro cabeludo sensível e reativo

  - tipo: relacionado_a_casa
    alvo: casa_6
    contexto: ocidental_todas
    nota: Casa VI governa disfunções crônicas e doenças de rotina

  # ── PROCESSOS ASSOCIADOS ─────────────────────────────────
  - tipo: pode_causar
    alvo: queda_capilar
    contexto: fisiologia_universal
    nota: inflamação → destruição do folículo → queda

  - tipo: pode_causar
    alvo: oleosidade_capilar_elevada
    contexto: fisiologia_universal
    nota: inflamação seborreica → produção excessiva de sebo
