id: cash_decisoes_ge
tipo: calendario_temporal
categoria: astrocash
suite: kalon_astro
modulo: astrocash
nome: AstroCash — Decisões Financeiras (Gê)
versao: "1.0.0"
descricao: Janelas financeiras por trânsito de Vênus sobre pontos natais — compatível com metodologia Gê/Solar Fire (Fase 1, sem midpoints)
engine:
  tipo: calendario_temporal
  versao_minima: "1.0.0"
  versao_maxima: null
metadata:
  autor: Kalon Team
  criado_em: 2026-07-01
  atualizado_em: 2026-07-01
  status: beta
  foundation: 1.0

o_que_e:
  titulo: O que é o AstroCash Gê
  texto: |
    Calendário de janelas financeiras baseado no trânsito de Vênus sobre
    pontos natais. Reproduz a metodologia da tabela financeira do Solar Fire
    (Fase 1 — sem pontos médios).

como_usar:
  titulo: Como utilizar este calendário
  passos:
    - Utilize as janelas para negociar, assinar contratos ou tomar decisões financeiras.
    - Conjunções e Trígonos são as janelas mais favoráveis.
    - Esta é a Fase 1 da metodologia Gê — pontos médios serão adicionados em versão futura.

legenda:
  - icone: "★"
    titulo: Excelente
    descricao: Conjunção ou Trígono de Vênus com ponto natal de alto impacto financeiro.
  - icone: "●"
    titulo: Favorável
    descricao: Sextil de Vênus com ponto natal. Bom momento para acordos e parcerias.

observacoes:
  titulo: Importante
  texto: |
    Esta estratégia usa Vênus como transitante, não a Lua.
    Os ciclos são mensais (Vênus percorre ~30° por mês).
    Fase 1 — pontos médios (Vênus/Júpiter, Marte/Júpiter) serão
    adicionados após implementação do Midpoint Engine.

calculo:
  estrategias:
    venus_sol:
      transitante: venus
      alvo_natal: sol
      aspectos: { conjuncao: 0, sextil: 60, trigono: 120 }
      janela_h: 6
