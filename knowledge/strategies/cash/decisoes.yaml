o_que_e:
  titulo: O que é o AstroCash
  texto: |
    O AstroCash mapeia os melhores momentos para tomar decisões financeiras importantes,
    sincronizando sua clareza mental, percepção de valor e equilíbrio entre risco e
    prudência com os trânsitos da Lua.

como_usar:
  titulo: Como utilizar este calendário
  passos:
    - Utilize as janelas indicadas para negociar, assinar contratos ou iniciar conversas comerciais.
    - Janelas com ★★★ ou mais são ideais para decisões de maior impacto.
    - Em janelas marcadas com Atenção, prefira planejar em vez de agir.
    - Evite decisões financeiras importantes nos horários marcados como Evite.

legenda:
  - icone: "★"
    titulo: Excelente
    descricao: Janela de alta qualidade. Momento favorável para decisões financeiras importantes.
  - icone: "●"
    titulo: Favorável
    descricao: Boa janela. Traz clareza e equilíbrio para negociações e acordos.
  - icone: "▲"
    titulo: Atenção
    descricao: Prefira planejar e revisar em vez de tomar decisões definitivas.
  - icone: "✕"
    titulo: Evite
    descricao: Momento desfavorável para compromissos financeiros importantes.

observacoes:
  titulo: Importante
  texto: |
    O AstroCash indica qualidade temporal — não prevê resultados financeiros.
    A decisão final é sempre sua. Consulte um profissional financeiro para
    decisões de grande impacto.

calculo:
  estrategias:
    mercurio_natal:
