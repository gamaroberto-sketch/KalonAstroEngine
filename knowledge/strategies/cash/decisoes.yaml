      plus: conjuncao
    jupiter_natal:
      alvo_natal: jupiter
      aspectos: { sextil: 60, trigono: 120 }
      janela_h: 6
      plus: trigono
    saturno_natal:
      alvo_natal: saturno
      aspectos: { sextil: 60, trigono: 120 }
