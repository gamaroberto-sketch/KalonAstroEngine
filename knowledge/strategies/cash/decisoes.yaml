nome: AstroCash — Janelas para Decisões Financeiras
versao: "1.0.0"
descricao: Janelas favoráveis para negociar, assinar, investir e tomar decisões financeiras importantes
engine:
  tipo: calendario_temporal
  versao_minima: "1.0.0"
  versao_maxima: null
