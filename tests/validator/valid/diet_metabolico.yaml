o_que_e:
  titulo: O que é o Astro*Diet
  texto: 'O Astro*Diet mapeia os melhores momentos do mês para ajustar sua alimentação

    com base nos trânsitos da Lua em relação ao seu Ascendente natal.

    '
como_usar:
  titulo: Como utilizar este calendário
  passos:
  - Utilize os horários como orientação prática.
  - Priorize o horário exato quando possível.
  - Se não for possível, utilize qualquer momento dentro da janela.
  - Não é necessário seguir todos os eventos do mês.
  - A consistência é mais importante do que a perfeição.
legenda:
- icone: ●
  titulo: Pouca Caloria
  descricao: Prefira refeições leves, reduzindo a ingestão calórica.
- icone: ▲
  titulo: Jejum
  descricao: Esta janela favorece protocolos de jejum previamente planejados.
observacoes:
  titulo: Importante
  texto: 'Este calendário é uma ferramenta de planejamento simbólico. Ele complementa

    hábitos saudáveis e o acompanhamento profissional quando necessário.

    '
