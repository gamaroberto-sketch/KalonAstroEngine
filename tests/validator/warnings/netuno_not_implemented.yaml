  status: production
  foundation: 1.0
o_que_e:
  titulo: O que é o AstroHair
  texto: 'O AstroHair mapeia os melhores dias e horários para você cortar o cabelo,

    sincronizando seus objetivos de Crescimento, Força e Beleza com os trânsitos da
    Lua.

    '
como_usar:
  titulo: Como utilizar este calendário
  passos:
  - Utilize os horários indicados como o momento em que a tesoura toca o cabelo.
  - Se não for possível no pico exato, tente agendar dentro da janela informada.
  - O mais importante é evitar os horários marcados como "Evite cortar".
legenda:
- icone: ★
  titulo: Excelente
  descricao: Aspecto de alta intensidade. Oportunidade perfeita para o objetivo.
- icone: ●
  titulo: Bom
  descricao: Janela favorável. Traz benefícios sólidos, com intensidade equilibrada.
- icone: ▲
  titulo: Abaixo da média / Atenção
  descricao: Pode haver certa resistência ou sensibilidade. Prefira outra data se
    possível.
- icone: ✕
  titulo: Evite cortar
  descricao: Lua fora de curso ou aspectos tensos severos. Os resultados tendem a
    ser imprevisíveis.
observacoes:
  titulo: Importante
  texto: 'Os horários listados já estão calculados para o fuso horário da cidade informada.

    Se você for viajar para um local com fuso diferente, refaça o cálculo para a nova
    cidade.

    '
calculo:
  estrategias:
    crescimento:
      alvo_natal: netuno
      aspectos:
        sextil: 60
        trigono: 120
      janela_h: 6
