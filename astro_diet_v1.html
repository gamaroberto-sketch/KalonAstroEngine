<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>AstroDiet — Calendário Metabólico</title>
<link rel="stylesheet" href="/components/kalon-report/AgendaKalon/agenda_kalon.css">
<link rel="stylesheet" href="/components/kalon-report/KalonIdentity/kalon_identity.css">
<script src="/components/kalon-report/AgendaKalon/agenda_kalon.js"></script>
<script src="/components/kalon-report/KalonIdentity/kalon_identity.js"></script>
<script src="/components/kalon-report/KalonReport/kalon_report.js"></script>
<style>
/* ── TOKENS ESCURO ───────────────────────────────────────── */
[data-theme="dark"] {
  --bg:#0C0D0F; --card:#13151A; --border:#1E2228; --muted:#272B34;
  --text:#E8E4DC; --dim:#7A8290; --dim2:#A8B0BC;
  --gold:#C9A84C; --gold-dk:#7A6228; --gold-bg:#1a1508; --gold-border:#3a2a10;
  --green:#5BAF82; --green-bg:#0d2019; --green-border:#1a4030;
  --red:#C85B5B; --red-bg:#1a0e0e; --red-border:#3a1a1a;
  --blue:#5B8AC8; --blue-bg:#0d1520; --blue-border:#1a2a40;
  --best-bg:#1a1508; --avoid-bg:#1a0e0e;
  --shadow:none;
}
/* ── TOKENS CLARO ────────────────────────────────────────── */
[data-theme="light"] {
  --bg:#F5F4F0; --card:#FFFFFF; --border:#DDD8CE; --muted:#EAE7E0;
  --text:#1A1A1A; --dim:#7A7870; --dim2:#4A4840;
  --gold:#8A6B20; --gold-dk:#6A4B10; --gold-bg:#FFF8E8; --gold-border:#DEB84A;
  --green:#2A7A50; --green-bg:#E8F5EE; --green-border:#5BAF82;
  --red:#A03030; --red-bg:#FBE8E8; --red-border:#C85B5B;
  --blue:#2A5A98; --blue-bg:#E8F0FB; --blue-border:#5B8AC8;
  --best-bg:#FFF8E0; --avoid-bg:#FBE8E8;
  --shadow:0 1px 3px rgba(0,0,0,.08);
}
/* ── IMPRESSÃO ───────────────────────────────────────────── */
@media print {
  html { --bg:#FFFFFF; --card:#FFFFFF; --border:#CCCCCC; --muted:#F0F0F0;
    --text:#000000; --dim:#555555; --dim2:#333333;
    --gold:#8A6B20; --gold-dk:#6A4B10; --gold-bg:#FFF8E0; --gold-border:#DEB84A;
    --green:#2A7A50; --green-bg:#E8F5EE; --green-border:#5BAF82;
    --red:#A03030; --red-bg:#FBE8E8; --red-border:#C85B5B;
    --blue:#2A5A98; --blue-bg:#E8F0FB; --blue-border:#5B8AC8;
    --best-bg:#FFF8E0; --avoid-bg:#FBE8E8; --shadow:none; }
  .no-print { display:none !important; }
  body { padding:16px; }
  .agenda-card, .best-day { break-inside:avoid; }
  header { border-bottom:1px solid #ccc; }
}
  body { background:#0C0D0F; color:#E8E4DC; font-family:system-ui,sans-serif; padding:0 16px 80px; }
  .wrap { max-width:720px; margin:0 auto; }
  header { padding:24px 0 18px; border-bottom:1px solid #1E2228; margin-bottom:24px; }
  .eyebrow { font-size:10px; letter-spacing:3px; text-transform:uppercase; color:#C9A84C; margin-bottom:8px; }
  h1 { font-size:24px; font-weight:300; }
  .form-card { background:#13151A; border:1px solid #1E2228; border-radius:8px; padding:20px; margin-bottom:14px; }
  .fields { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px; }
  .full { grid-column:1/-1; }
  label { display:block; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#7A8290; margin-bottom:5px; }
  input { width:100%; background:#272B34; border:1px solid #1E2228; border-radius:6px; color:#E8E4DC; font-size:14px; padding:9px 11px; }
  .btn { width:100%; background:#C9A84C; border:none; border-radius:6px; color:#fff; cursor:pointer; font-size:12px; font-weight:700; letter-spacing:1px; padding:12px; text-transform:uppercase; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Kalon Astro · AstroDiet</div>
    <h1>Calendário Metabólico</h1>
  </header>

  <div class="form-card">
    <div class="fields">
      <div class="full"><label>Nome</label><input id="nome" placeholder="Nome completo"></div>
      <div><label>Data de nascimento</label><input id="data" type="date"></div>
      <div><label>Hora (local)</label><input id="hora" type="time" value="00:00"></div>
      <div class="full" style="position:relative;">
        <label>Cidade de nascimento</label>
        <input id="cidade" autocomplete="off" oninput="filtrarCidades()" onfocus="filtrarCidades()" onblur="setTimeout(()=>document.getElementById('cidade-lista').style.display='none',200)" placeholder="Digite o nome da cidade...">
        <div id="cidade-lista" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--card);border:1px solid var(--gold);border-radius:6px;max-height:200px;overflow-y:auto;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.3);margin-top:4px;"></div>
      </div>

      <div><label>Data de início</label><input id="data-inicio" type="date" value="2026-07-01"></div>
      <div><label>Período</label>
        <select id="periodo" style="width:100%;background:#272B34;border:1px solid #1E2228;border-radius:6px;color:#E8E4DC;padding:9px 11px;">
          <option value="1">1 mês</option><option value="3">3 meses</option>
        </select>
      </div>
      <div id="coords-manual" style="display:none;grid-column:1/-1;grid-template-columns:1fr 1fr;gap:10px;">
        <div>
          <label>Latitude (opcional)</label>
          <input id="latitude" type="number" step="0.0001" placeholder="ex: -22.9835">
        </div>
        <div>
          <label>Longitude (opcional)</label>
          <input id="longitude" type="number" step="0.0001" placeholder="ex: -49.8672">
        </div>
      </div>
      <div style="grid-column:1/-1;font-size:11px;color:var(--dim);margin-top:-6px;">
        <a href="#" onclick="toggleCoords();return false;" style="color:var(--gold);text-decoration:none;">
          🌍 Cidade fora do Brasil? Informe coordenadas manualmente
        </a>
      </div>
    </div>
    <button class="btn" onclick="iniciarComponente()">Gerar calendário</button>
  </div>

  <div id="agendaDiet"></div>
</div>

<script>
// AUTOCOMPLETE CIDADES
let CIDADES_BR = [];

async function carregarCidades() {
  if (CIDADES_BR.length > 0) return;
  try {
    const res = await fetch('/api/v1/cidades');
    const data = await res.json();
    CIDADES_BR = data.cidades.map(c => c.display);
  } catch (e) {
    console.error("Erro ao carregar cidades da API:", e);
  }
}

async function filtrarCidades() {
  await carregarCidades();
  const input = document.getElementById('cidade');
  const lista = document.getElementById('cidade-lista');
  const termo = input.value.toLowerCase().trim();
  if (termo.length < 2) { lista.style.display='none'; return; }
  const filtradas = CIDADES_BR.filter(c => c.toLowerCase().includes(termo)).slice(0,10);
  if (!filtradas.length) { lista.style.display='none'; return; }
  lista.innerHTML = filtradas.map(c =>
    '<div onclick="selecionarCidade(\'' + c + '\')" ' +
    'style="padding:10px 14px;cursor:pointer;font-size:13px;color:var(--text);border-bottom:1px solid var(--border);transition:background .1s;" ' +
    'onmouseover="this.style.background=\'var(--muted)\'" onmouseout="this.style.background=\'\'"> ' +
    c + '</div>'
  ).join('');
  lista.style.display = 'block';
}

function selecionarCidade(cidade) {
  document.getElementById('cidade').value = cidade;
  document.getElementById('cidade-lista').style.display = 'none';
}

function toggleCoords() {
  const el = document.getElementById('coords-manual');
  el.style.display = el.style.display === 'none' ? 'grid' : 'none';
}

function iniciarComponente() {
  new KalonReport({
    estrategia: 'diet_metabolico',
    container: '#agendaDiet',
    nivel: 'essencial',
    nome: document.getElementById('nome').value,
    data_nascimento: document.getElementById('data').value,
    hora_nascimento: document.getElementById('hora').value,
    cidade: document.getElementById('cidade').value,
    latitude: parseFloat(document.getElementById('latitude')?.value) || null,
    longitude: parseFloat(document.getElementById('longitude')?.value) || null,
    data_inicio: document.getElementById('data-inicio').value,
    periodo_meses: parseInt(document.getElementById('periodo').value)
  }).render();
}
</script>
</body>
</html>
